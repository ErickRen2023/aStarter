<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>起始页</title>
  <link rel="stylesheet" href="newtab.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <div id="background-layer">
    <img id="bg-image" src="" alt="" />
    <div id="bg-overlay"></div>
  </div>

  <main id="content">
    <div id="clock-container">
      <div id="time" class="clock-time">00:00</div>
      <div id="date" class="clock-date">2026年7月3日 星期四</div>
    </div>

    <div id="search-container">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="输入搜索内容或 / 命令…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="search-hint" class="search-hint"></div>
    </div>
  </main>

  <button id="settings-btn" class="settings-btn" title="设置">
    <i class="ri-settings-3-line"></i>
  </button>

  <script type="module" src="newtab.js"></script>
</body>
</html>
