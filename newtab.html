<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>起始页</title>
  <link rel="stylesheet" href="newtab.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <div id="background-layer">
    <img id="bg-image" src="" alt="" />
    <div id="bg-overlay"></div>
  </div>

  <main id="content">
    <div id="clock-container">
      <div id="time" class="clock-time">00:00</div>
      <div id="date" class="clock-date">2026年7月3日 星期四</div>
    </div>

    <div id="search-container">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="输入搜索内容或 / 命令…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="search-hint" class="search-hint"></div>
    </div>
  </main>

  <button id="download-btn" class="download-btn" title="保存当前壁纸">
    <i class="ri-download-2-line"></i>
  </button>
  <button id="settings-btn" class="settings-btn" title="设置">
    <i class="ri-settings-3-line"></i>
  </button>

  <!-- Bing 7 天导航按钮 -->
  <div id="bg-nav-group" class="bg-nav-group">
    <button id="bg-nav-prev" class="bg-nav-btn" title="前一张壁纸">
      <i class="ri-arrow-left-s-line"></i>
    </button>
    <div id="bg-day-indicator" class="bg-day-indicator">2026-07-14</div>
    <button id="bg-nav-next" class="bg-nav-btn" title="后一张壁纸">
      <i class="ri-arrow-right-s-line"></i>
    </button>
  </div>

  <!-- Settings Modal Overlay -->
  <div id="settings-modal-overlay" class="settings-modal-overlay">
    <div id="settings-modal" class="settings-modal">
      <div class="settings-modal-header">
        <h2>设置</h2>
        <button id="settings-modal-close" class="modal-close-btn" aria-label="关闭设置">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div id="settings-modal-body" class="settings-modal-body">

        <!-- 背景设置 -->
        <section class="settings-section">
          <h2 class="section-title">背景设置</h2>
          <div class="form-group">
            <label class="form-label">背景来源</label>
            <select id="bg-source" class="form-select">
              <option value="bing">Bing 每日图片</option>
              <option value="local">本地上传</option>
              <option value="url">远程 URL</option>
            </select>
          </div>
          <div class="form-group" id="group-bg-urls">
            <label class="form-label">远程 URL（支持多个，英文逗号分隔）</label>
            <textarea id="bg-urls" class="form-textarea" rows="3"
              placeholder="https://example.com/image1.jpg, https://example.com/image2.jpg"></textarea>
          </div>
          <div class="form-group" id="group-bg-local">
            <label class="form-label">本地上传</label>
            <input type="file" id="bg-local-input" accept="image/*" multiple class="form-file" />
            <div id="bg-local-preview" class="local-preview"></div>
          </div>
          <div class="form-group">
            <label class="form-label">填充方式</label>
            <select id="bg-fill" class="form-select">
              <option value="cover">覆盖（Cover）</option>
              <option value="contain">包含（Contain）</option>
              <option value="fill">拉伸填充（Fill）</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">暗色遮罩透明度：<span id="overlay-value">30</span>%</label>
            <input type="range" id="bg-overlay" min="0" max="60" value="30" class="form-range" />
          </div>
          <div class="form-group">
            <label class="form-checkbox">
              <input type="checkbox" id="bg-blur-enabled" />
              <span>启用背景模糊</span>
            </label>
          </div>
          <div class="form-group" id="group-blur-level">
            <label class="form-label">模糊等级：<span id="blur-value">5</span></label>
            <input type="range" id="bg-blur-level" min="1" max="10" value="5" class="form-range" />
          </div>
          <div class="form-group">
            <label class="form-label">轮播间隔（秒，0 = 关闭）</label>
            <input type="number" id="bg-carousel" min="0" max="3600" value="0" class="form-input" />
          </div>
        </section>

        <!-- 时间设置 -->
        <section class="settings-section">
          <h2 class="section-title">时间设置</h2>
          <div class="form-group">
            <label class="form-checkbox">
              <input type="checkbox" id="clock-seconds" checked />
              <span>显示秒钟</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-checkbox">
              <input type="checkbox" id="clock-date" checked />
              <span>显示日期</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">时间格式</label>
            <select id="clock-hourformat" class="form-select">
              <option value="24h" selected>24 小时制</option>
              <option value="12h">12 小时制（AM/PM）</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">字体大小</label>
            <select id="clock-fontsize" class="form-select">
              <option value="32">小</option>
              <option value="40">中</option>
              <option value="48" selected>大（默认）</option>
              <option value="56">加大</option>
              <option value="64">超大</option>
            </select>
          </div>
        </section>

        <!-- 搜索设置 -->
        <section class="settings-section">
          <h2 class="section-title">搜索设置</h2>
          <div class="form-group">
            <label class="form-label">默认搜索引擎</label>
            <select id="search-engine" class="form-select">
              <option value="baidu">百度</option>
              <option value="google">Google</option>
              <option value="bing">Bing</option>
              <option value="duckduckgo">DuckDuckGo</option>
              <option value="sogou">搜狗搜索</option>
              <option value="so360">360 搜索</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="form-group" id="group-search-url">
            <label class="form-label">自定义搜索引擎 URL（<code>{query}</code> 为占位符）</label>
            <input type="text" id="search-engine-url" class="form-input"
              placeholder="https://www.example.com/search?q={query}" />
          </div>
          <div class="form-group">
            <label class="form-label">页面内快捷键（单键唤起搜索框）</label>
            <div class="shortcut-row">
              <input type="text" id="search-shortcut" class="form-input form-input-short" maxlength="1" placeholder="/" />
              <button id="record-shortcut-btn" class="btn btn-outline">录制快捷键</button>
            </div>
            <p class="form-hint">默认 / 键。推荐使用 F2、/ 等不与浏览器冲突的单键。</p>
          </div>
        </section>

        <!-- 命令管理 -->
        <section class="settings-section">
          <h2 class="section-title">命令管理</h2>
          <p class="section-desc">自定义搜索引擎命令。在搜索框输入 <code>/prefix</code> 即可使用对应搜索引擎。</p>
          <div id="commands-list" class="commands-list"></div>
          <div class="commands-actions">
            <button id="add-command-btn" class="btn btn-primary">+ 添加命令</button>
            <button id="export-commands-btn" class="btn btn-outline">导出命令</button>
            <button id="import-commands-btn" class="btn btn-outline">导入命令</button>
          </div>
        </section>

        <!-- 其他设置 -->
        <section class="settings-section">
          <h2 class="section-title">其他设置</h2>
          <div class="form-group">
            <label class="form-label">语言</label>
            <select id="general-lang" class="form-select">
              <option value="zh-CN">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="form-actions">
            <button id="export-btn" class="btn btn-primary">导出全部配置</button>
            <button id="import-btn" class="btn btn-outline">导入配置</button>
            <button id="reset-btn" class="btn btn-danger">重置默认设置</button>
          </div>
        </section>

      <!-- Hidden file inputs for import -->
      <input type="file" id="import-file-input" accept=".json" class="hidden-input" />
      <input type="file" id="import-commands-input" accept=".json" class="hidden-input" />

      </div>
    </div>
  </div>

  <script type="module" src="newtab.js"></script>
</body>
</html>
